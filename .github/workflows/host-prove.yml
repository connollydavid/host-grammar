# host-prove deep-verification lanes for the ParallelScan spec — the upper rungs of
# the verification ladder, above the bounded TLC lane (specula.yml). Both prove the
# tiling correctness for EVERY (N,K), which bounded TLC can only sample. Tools are
# fetched as official prebuilt binaries pinned by version + SHA256 (the same pins
# host-prove records in tools.lock); no Docker. Resolves connollydavid/host#3.
name: host-prove
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Apalache (symbolic / SMT): the index-ordered tiling reconstructs the input for
  # all (N,K), 1<=K<=N<=8 — the parametric claim. Cross-platform (JVM) OS matrix.
  apalache:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install Apalache 0.58.0 (pinned + sha256)
        run: |
          curl -sSL -o apalache.tgz https://github.com/apalache-mc/apalache/releases/download/v0.58.0/apalache-0.58.0.tgz
          echo "55b4da129140b3b6b4106b31eddf36b5f49d896bf2ec8b4cf81c93bc37b9b3d7  apalache.tgz" | shasum -a 256 -c -
          mkdir -p "$HOME/apalache" && tar -xzf apalache.tgz -C "$HOME/apalache" --strip-components=1
          echo "$HOME/apalache/bin" >> "$GITHUB_PATH"
      - name: Symbolic-check Reconstructs for all (N,K)
        working-directory: spec
        run: |
          apalache-mc typecheck ParallelScanSymbolic.tla
          out=$(apalache-mc check --inv=Reconstructs --cinit=CInit --length=0 ParallelScanSymbolic.tla 2>&1)
          echo "$out"
          echo "$out" | grep -q "The outcome is: NoError" \
            || { echo "::error::Apalache found a violation or failed to run"; exit 1; }

  # TLAPS (deductive): every worker index is in-bounds, proved for all (N,K).
  # The official prebuilt installer is an x86_64-linux ELF, so this lane is Linux.
  tlaps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TLAPS 1.4.5 (pinned + sha256)
        run: |
          curl -sSL -o tlaps.bin https://github.com/tlaplus/tlapm/releases/download/v1.4.5/tlaps-1.4.5-x86_64-linux-gnu-inst.bin
          echo "59324a8c6f341737ee1920648d076a3ee2c09824c647a7f25ac57ebe520d92be  tlaps.bin" | sha256sum -c -
          chmod +x tlaps.bin
          ./tlaps.bin -d "$HOME/tlaps"
          echo "$HOME/tlaps/bin" >> "$GITHUB_PATH"
      - name: Prove WorkerIndexInBounds for all (N,K)
        working-directory: spec
        run: |
          # Bind the gate to the declared theorem: a rename or deletion of
          # WorkerIndexInBounds (the obligation in ParallelScan.obligations) must
          # fail here, not pass vacuously on some other proved obligation.
          grep -q "THEOREM WorkerIndexInBounds" ChunkBounds.tla \
            || { echo "::error::ChunkBounds.tla no longer declares THEOREM WorkerIndexInBounds"; exit 1; }
          out=$(tlapm --toolbox 0 0 ChunkBounds.tla 2>&1)
          echo "$out"
          echo "$out" | grep -q "status:failed" && { echo "::error::a TLAPS obligation failed"; exit 1; }
          echo "$out" | grep -q "status:proved" || { echo "::error::tlapm proved no obligations"; exit 1; }
          echo "TLAPS: all obligations proved"
