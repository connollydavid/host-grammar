# Run the unit + property-based tests and clippy. The PBTs in
# tests/prose_properties.rs are what the allium obligations manifest
# (host-grammar.obligations) maps obligations to; without the test job they would
# be named but never executed. The clippy job gates on the same -D warnings bar the
# sibling host-* components use, so lint debt cannot drift in unseen.
name: Test
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test
        run: cargo test
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
